<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Stage Teleprompter</title>
    <link rel="stylesheet" href="css/stage.css">
    <style>
        body{
            background:black;
            color:white;
            font-family:Arial;
            overflow:hidden;
            margin:0;
            padding:0;
        }

        #topBar{
            position:fixed;
            top:0;
            width:100%;
            display:flex;
            align-items:center;
            gap:20px;
            padding:12px 30px;
            font-size:28px;
            background:rgba(0,0,0,0.95);
            z-index:100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        #chordMask {
            position:fixed;
            top:80px;
            left:0;
            width:100%;
            height:420px;
            background:linear-gradient(black, transparent 80%);
            z-index:90;
            pointer-events:none;
        }
        #bigChord{
            position:fixed;
            top:110px;
            width:100%;
            font-size: clamp(140px, 22vw, 320px);
            font-weight:bold;
            color:#00cc77;
            text-align:center;
            z-index:95;
            text-shadow: 0 0 40px #00cc77;
            pointer-events:none;
            line-height:1;
        }

        #currentSongContainer { flex:1; min-width:0; display:flex; align-items:center; }
        #currentSong { font-size:26px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        #nextSongContainer { flex:0 0 auto; font-size:22px; opacity:0.85; white-space:nowrap; }

        .sleek-btn {
            background:#1f1f1f;
            color:#e5e5e5;
            border:1px solid #444;
            padding:10px 20px;
            font-size:16px;
            font-weight:500;
            border-radius:9999px;
            cursor:pointer;
            transition:all .25s cubic-bezier(0.4,0,0.2,1);
            box-shadow:0 3px 10px rgba(0,0,0,.4);
        }
        .sleek-btn:hover { background:#2a2a2a; border-color:#00cc77; color:#fff; transform:translateY(-1px); }
        .sleek-btn.primary { background:#00aa66; color:#111; border:none; font-weight:700; }

        #transportBar {
            position:fixed;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            background:rgba(15,15,15,.95);
            border:2px solid #222;
            border-radius:9999px;
            padding:8px 16px;
            display:flex;
            gap:8px;
            z-index:110;
            box-shadow:0 8px 30px rgba(0,0,0,.7);
        }

        #lyricsContainer{
            position:absolute;
            top:520px;
            bottom:120px;
            left:0;
            right:0;
            overflow-y:auto;
            text-align:center;
            font-size: clamp(24px, 3vw, 38px);
            line-height:1.55;
            padding:0 60px 40px;
            z-index:10;
            color:#ddd;
        }
        .line{
            margin:18px 0;
            padding:8px 20px;
            border-radius:8px;
            transition:all .3s ease;
        }
        .line.current {
            background:rgba(0,204,119,.15);
            color:#fff;
            font-weight:600;
            box-shadow:0 0 25px rgba(0,204,119,.4);
        }
        .chord{
            font-weight:bold;
            color:#aaa;
            display:inline-block;
            min-width:100px;
            margin-right:12px;
        }

        /* MODAL – FIXED & HARDENED */
        #modal {
            display: none !important; /* extra strong default */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #modal-content {
            background: #111;
            padding: 30px;
            border-radius: 12px;
            width: 92%;
            max-width: 920px;
            max-height: 94vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0,204,119,0.3);
        }
        #modal-content label { display:block; margin:14px 0 6px; font-size:18px; font-weight:bold; }
        #modal-content input, #modal-content textarea {
            width:100%; padding:12px; background:#222; color:#0f0; border:2px solid #333;
            border-radius:6px; font-family:monospace; font-size:16px;
        }
        #modal-content textarea { height:240px; resize:vertical; }
    </style>
</head>
<body>
    <div id="topBar">
        <div id="currentSongContainer">
            <span id="currentSong">No song loaded</span>
        </div>
        <div id="nextSongContainer">
            Next: <span id="nextSong">—</span>
        </div>
        
        <div class="top-controls">
            <button onclick="toggleModal()" class="sleek-btn primary">📥 Import</button>
            <button onclick="toggleMidiPanel()" class="sleek-btn">🎹 MIDI</button>
            <button onclick="toggleSetlistPanel()" class="sleek-btn">📜 Setlist</button>
            <button onclick="toggleLayout()" class="sleek-btn" id="layoutBtn">📐 Auto</button>
            <button onclick="toggleFullscreen()" class="sleek-btn">⛶ Full</button>
        </div>
    </div>

    <div id="chordMask"></div>
    <div id="bigChord"></div>

    <div id="lyricsContainer">
        <div id="lyrics"></div>
    </div>

    <div id="transportBar">
        <button onclick="previousSong()" class="sleek-btn">⏮ PREV</button>
        <button onclick="pauseSong()" class="sleek-btn">⏹ STOP</button>
        <button onclick="togglePlayPause()" class="sleek-btn play-btn" id="transportPlayBtn">▶️ PLAY</button>
        <button onclick="nextSong()" class="sleek-btn">⏭ NEXT</button>
    </div>

    <!-- IMPORT MODAL – now guaranteed closed on startup -->
    <div id="modal">
        <div id="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0; color:#ddd;">🚀 Auto-Import Chord Chart</h2>
                <button onclick="closeModal()" style="background:none; border:none; font-size:32px; color:#aaa; cursor:pointer; line-height:1;">×</button>
            </div>
            <p style="margin-bottom:22px; opacity:0.8;">
                Paste full chord chart exactly as it appears.<br>
                <strong>Structure is preserved 100%.</strong>
            </p>
            
            <label>Song Title</label>
            <input id="importTitle" type="text" value="New Song" placeholder="Song Title">
            
            <label>Artist</label>
            <input id="importArtist" type="text" value="Unknown Artist" placeholder="Artist Name">
            
            <label>BPM</label>
            <input id="importBpm" type="number" value="120" min="40" max="240">
            
            <label>Paste Chord Chart (exact original structure)</label>
            <textarea id="chartPaste" placeholder="Paste the entire chord chart here..."></textarea>

            <label>Or upload .txt file</label>
            <input type="file" id="chartFile" accept=".txt" onchange="handleFileUpload(event)">
            
            <div style="margin:24px 0; display:flex; gap:12px;">
                <button onclick="parseAndImport()" class="sleek-btn primary">Parse &amp; Preview</button>
                <button onclick="closeModal()" class="sleek-btn">Cancel</button>
            </div>

            <div id="preview"></div>
            <div id="jsonPreview" style="display:none;"></div>
            
            <div style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap;">
                <button id="downloadBtn" onclick="downloadSongJSON()" style="display:none;" class="sleek-btn primary">⬇️ Download song.json</button>
                <button id="tempLoadBtn" onclick="loadTempSongNow()" style="display:none;" class="sleek-btn">▶️ Preview NOW</button>
                <button onclick="closeModal()" class="sleek-btn">Close</button>
            </div>
        </div>
    </div>

    <!-- MIDI Panel & Setlist Panel (unchanged) -->
    <div id="midiPanel" style="display:none;">
        <div class="header"><span style="font-size:22px;">🎹 MIDI Controls</span><span id="liveBpm" style="margin-left:auto;font-family:monospace;background:#222;padding:4px 12px;border-radius:9999px;font-size:18px;">BPM: —</span></div>
        <div style="display:flex;gap:8px;">
            <button onclick="previousSong()" class="sleek-btn">⏮ PREV</button>
            <button onclick="togglePlayPause()" class="sleek-btn" id="playPauseBtn">▶️ PLAY / PAUSE</button>
            <button onclick="nextSong()" class="sleek-btn">⏭ NEXT</button>
        </div>
    </div>

    <div id="setlistPanel">
        <div class="setlist-header">
            <h3 style="margin:0;">📜 SETLIST</h3>
            <button onclick="toggleSetlistPanel()" class="sleek-btn" style="margin-left:auto;background:none;border:none;color:#ddd;font-size:28px;padding:4px 12px;box-shadow:none;">✕</button>
        </div>
        <div id="setlistItems"></div>
    </div>

    <script src="js/midi.js"></script>
    <script src="js/scroll.js"></script>
    <script src="js/stage.js"></script>
    <script>
        // HARDENED MODAL SAFETY – runs immediately
        function forceCloseModalOnStart() {
            const modal = document.getElementById('modal');
            if (modal) {
                modal.style.display = 'none';
            }
        }

        // Make sure modal is closed as soon as possible
        window.addEventListener('load', forceCloseModalOnStart);
        window.addEventListener('DOMContentLoaded', forceCloseModalOnStart);

        // Layout system (unchanged)
        let layoutMode = localStorage.getItem('teleprompterLayout') || 'auto';
        function updateLayoutButton() {
            const btn = document.getElementById('layoutBtn');
            btn.textContent = layoutMode === 'auto' ? '📐 Auto' : layoutMode === 'wide' ? '📐 Wide' : '📐 Portrait';
        }
        function applyLayout() {
            document.body.classList.remove('force-wide', 'force-portrait');
            if (layoutMode === 'wide') document.body.classList.add('force-wide');
            if (layoutMode === 'portrait') document.body.classList.add('force-portrait');
            updateLayoutButton();
            if (typeof renderSetlist === 'function') renderSetlist();
        }
        function toggleLayout() {
            if (layoutMode === 'auto') layoutMode = 'wide';
            else if (layoutMode === 'wide') layoutMode = 'portrait';
            else layoutMode = 'auto';
            localStorage.setItem('teleprompterLayout', layoutMode);
            applyLayout();
        }
        applyLayout();

        console.log('%c🎸 Stage Teleprompter READY – Modal fixed & hidden on startup', 'color:#00cc77;font-size:18px');
    </script>
</body>
</html>
