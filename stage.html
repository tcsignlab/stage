<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Guitar Stage Teleprompter</title>
<style>
*{box-sizing:border-box;}
body{background:#000;color:#fff;font-family:Arial,sans-serif;overflow:hidden;margin:0;padding:0;}

/* ── Top Bar ── */
#topBar{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;
  background:rgba(0,0,0,.95);
  z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,.8);
  height:72px;
}
#currentSong{font-size:22px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
#nextSongContainer{font-size:16px;opacity:.8;white-space:nowrap;flex-shrink:0;}
#songTime{font-family:monospace;font-size:18px;color:#0f0;white-space:nowrap;flex-shrink:0;min-width:110px;text-align:right;}
.top-controls{display:flex;gap:8px;flex-shrink:0;}

/* ── Big Chord Display ── */
#chordMask{position:fixed;top:72px;left:0;right:0;height:520px;background:linear-gradient(to bottom,#000 76%,transparent 94%);z-index:90;pointer-events:none;}
#bigChordContainer{position:fixed;top:100px;left:calc(340px + 50%);transform:translateX(-50%);display:flex;align-items:center;gap:48px;z-index:95;pointer-events:none;}
#bigChord{font-size:clamp(120px,18vw,280px);font-weight:bold;color:#00cc77;text-shadow:0 0 30px #00cc77;line-height:1;}
#arrowBetween{font-size:clamp(48px,6vw,96px);color:#00cc77;opacity:.7;}
#nextChord{font-size:clamp(56px,8vw,120px);font-weight:bold;color:#00cc77;opacity:.45;transition:opacity .3s;}
#nextChord.active{opacity:1;}

/* ── Lyrics ── */
#lyricsContainer{position:fixed;top:520px;bottom:80px;left:380px;right:16px;overflow:hidden;text-align:center;font-size:clamp(22px,2.6vw,36px);line-height:1.6;padding:24px 48px;z-index:10;color:#ddd;}
#lyricsInner{position:relative;transition:transform .05s linear;}
.line{margin:22px 0;padding:6px 16px;border-radius:6px;}
.chord{font-weight:bold;color:#888;display:inline-block;min-width:110px;margin-right:14px;transition:color .2s;}
.chord.active{color:#00cc77;text-shadow:0 0 16px #00cc77;}
.section{color:#00cc77!important;font-weight:bold;font-size:1.35em;margin:32px 0 14px;text-shadow:0 0 14px #00cc77;}

/* ── Transport ── */
#transportBar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(15,15,15,.95);border:1.5px solid #222;border-radius:9999px;padding:7px 14px;display:flex;gap:8px;z-index:110;box-shadow:0 8px 30px rgba(0,0,0,.7);}

/* ── Buttons ── */
.btn{background:#1f1f1f;color:#e5e5e5;border:1px solid #444;padding:8px 18px;font-size:15px;font-weight:500;border-radius:9999px;cursor:pointer;transition:background .2s,border-color .2s,transform .15s;}
.btn:hover{background:#2a2a2a;border-color:#00cc77;color:#fff;transform:translateY(-1px);}
.btn.primary{background:#00aa66;color:#111;border:none;font-weight:700;}

/* ── Setlist Panel ── */
#setlistPanel{position:fixed;left:16px;top:80px;width:350px;height:calc(100vh - 152px);background:#1a1a1a;border:1.5px solid #333;border-radius:14px;padding:16px;overflow-y:auto;z-index:500;box-shadow:0 0 40px rgba(0,0,0,.7);}
.setlist-header{display:flex;align-items:center;margin-bottom:14px;color:#ddd;}
.setlist-item{padding:12px 16px;margin:5px 0;border-radius:8px;cursor:pointer;transition:background .2s;position:relative;color:#f0f0f0;font-size:15px;}
.setlist-item:hover{background:#333;}
.setlist-item.current{background:#00aa66;color:#111;font-weight:bold;box-shadow:0 0 12px #00cc77;}
.dropdown-arrow{position:absolute;right:14px;top:12px;cursor:pointer;font-size:20px;color:#0f0;z-index:10;}
.track-subpanel{margin:6px 0 6px 14px;background:rgba(0,0,0,.5);padding:14px;border-radius:8px;}
.track-row{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:14px;}
.track-row label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── Modals ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;align-items:center;justify-content:center;}
.modal-box{background:#111;padding:28px;border-radius:12px;width:92%;max-width:860px;max-height:92vh;overflow-y:auto;box-shadow:0 0 40px rgba(0,204,119,.25);}
.modal-box label{display:block;margin:12px 0 5px;font-size:16px;font-weight:bold;}
.modal-box input,.modal-box textarea{width:100%;padding:10px;background:#1e1e1e;color:#0f0;border:1.5px solid #333;border-radius:6px;font-family:monospace;font-size:15px;}
.modal-box textarea{height:220px;resize:vertical;}
</style>
</head>
<body>

<div id="topBar">
  <span id="currentSong">No song loaded</span>
  <span id="nextSongContainer">Next: <span id="nextSong">—</span></span>
  <span id="songTime">0:00 / 0:00</span>
  <div class="top-controls">
    <button onclick="openModal('importModal')" class="btn primary">📥 Import</button>
    <button onclick="openModal('midiModal')" class="btn">⚙️ MIDI</button>
    <button onclick="toggleFullscreen()" class="btn">⛶ Full</button>
  </div>
</div>

<div id="chordMask"></div>
<div id="bigChordContainer">
  <div id="bigChord"></div>
  <span id="arrowBetween">→</span>
  <div id="nextChord">—</div>
</div>

<div id="lyricsContainer"><div id="lyricsInner"></div></div>

<div id="transportBar">
  <button onclick="previousSong()" class="btn">⏮ PREV</button>
  <button onclick="stopSong()" class="btn">⏹ STOP</button>
  <button onclick="togglePlayPause()" class="btn primary" id="playBtn">▶️ PLAY</button>
  <button onclick="nextSong()" class="btn">⏭ NEXT</button>
</div>

<!-- Import Modal -->
<div id="importModal" class="modal-overlay">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <h2 style="margin:0;color:#ddd;">📥 Import Chord Chart</h2>
      <button onclick="closeModal('importModal')" style="background:none;border:none;font-size:30px;color:#aaa;cursor:pointer;">×</button>
    </div>
    <label>Song Title</label><input id="importTitle" type="text" value="New Song">
    <label>Artist</label><input id="importArtist" type="text" value="Unknown Artist">
    <label>BPM</label><input id="importBpm" type="number" value="120" min="40" max="240">
    <label>Paste Chord Chart</label>
    <textarea id="chartPaste" placeholder="Paste the entire chord chart here...&#10;&#10;Format each line as:&#10;  0:00  Am  verse lyrics here&#10;  0:15  F   next line&#10;&#10;Or use section headers like [Verse], [Chorus]"></textarea>
    <label>Or upload .txt file</label>
    <input type="file" id="chartFile" accept=".txt" onchange="handleFileUpload(event)">
    <div style="margin:20px 0;display:flex;gap:10px;flex-wrap:wrap;">
      <button onclick="parseAndImport()" class="btn primary">Parse &amp; Preview</button>
      <button id="downloadBtn" onclick="downloadSongJSON()" style="display:none;" class="btn primary">⬇️ Download JSON</button>
      <button id="loadNowBtn" onclick="loadParsedSong()" style="display:none;" class="btn">▶️ Load Now</button>
      <button onclick="closeModal('importModal')" class="btn">Cancel</button>
    </div>
    <div id="importPreview" style="color:#0f0;font-family:monospace;font-size:13px;white-space:pre-wrap;max-height:220px;overflow-y:auto;background:#0a0a0a;padding:12px;border-radius:6px;display:none;"></div>
  </div>
</div>

<!-- MIDI Modal -->
<div id="midiModal" class="modal-overlay">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <h2 style="margin:0;color:#ddd;">⚙️ MIDI Footswitch Routing</h2>
      <button onclick="closeModal('midiModal')" style="background:none;border:none;font-size:30px;color:#aaa;cursor:pointer;">×</button>
    </div>
    <p style="opacity:.75;margin-bottom:18px;">Assign CC numbers (0–127) for your footswitch.<br>Defaults: 120=Prev • 121=Stop • 122=Play/Pause • 123=Next • 124=Click On/Off</p>
    <label>CC for PREV</label><input id="ccPrev" type="number" min="0" max="127" value="120">
    <label>CC for STOP</label><input id="ccStop" type="number" min="0" max="127" value="121">
    <label>CC for PLAY/PAUSE</label><input id="ccPlay" type="number" min="0" max="127" value="122">
    <label>CC for NEXT</label><input id="ccNext" type="number" min="0" max="127" value="123">
    <label>CC for CLICK ON/OFF</label><input id="ccClick" type="number" min="0" max="127" value="124">
    <div style="margin:20px 0;display:flex;gap:10px;">
      <button onclick="saveMidiMap()" class="btn primary">Save</button>
      <button onclick="closeModal('midiModal')" class="btn">Cancel</button>
    </div>
  </div>
</div>

<!-- Setlist Panel -->
<div id="setlistPanel">
  <div class="setlist-header">
    <h3 style="margin:0;">📜 SETLIST</h3>
    <button onclick="document.getElementById('setlistPanel').style.display='none'" class="btn" style="margin-left:auto;padding:4px 10px;font-size:22px;background:none;border:none;color:#ddd;">✕</button>
  </div>
  <div id="setlistItems"></div>
</div>

<script>
/* ── State ── */
let setlist = [], currentSongIndex = 0, song = null;
let startTime = null, pausedElapsed = 0, playing = false;
let audioTracks = [], audioContext = null;
let clickOn = true, clickVolume = 0.75, clickInterval = null;
let expandedSongIndex = -1, currentBPM = 120, scrollMultiplier = 11.5;
let parsedSongTemp = null;

/* MIDI CC defaults from localStorage */
let CC = {
  prev:  +localStorage.getItem('midiCCPrev')  || 120,
  stop:  +localStorage.getItem('midiCCStop')  || 121,
  play:  +localStorage.getItem('midiCCPlay')  || 122,
  next:  +localStorage.getItem('midiCCNext')  || 123,
  click: +localStorage.getItem('midiCCClick') || 124,
};

/* ── Audio ── */
function initAudio() {
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
}

function beep() {
  initAudio();
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.frequency.value = 800;
  gain.gain.value = clickVolume;
  osc.connect(gain).connect(audioContext.destination);
  osc.start();
  osc.stop(audioContext.currentTime + 0.05);
}

function startContinuousClick() {
  stopContinuousClick();
  if (!clickOn || !playing) return;
  clickInterval = setInterval(() => { if (playing && clickOn) beep(); }, 60000 / currentBPM);
}

function stopContinuousClick() {
  clearInterval(clickInterval);
  clickInterval = null;
}

function playCountIn(beats, callback) {
  if (!clickOn) { callback(); return; }
  initAudio();
  let left = beats;
  const ms = 60000 / currentBPM;
  const tick = () => { beep(); if (--left > 0) setTimeout(tick, ms); else setTimeout(callback, ms); };
  tick();
}

function startBackingTracks() {
  audioTracks.forEach(t => { t.audio.currentTime = 0; t.audio.play().catch(()=>{}); });
}

function stopAllAudio() {
  audioTracks.forEach(t => { t.audio.pause(); t.audio.currentTime = 0; });
  stopContinuousClick();
}

function pauseAllAudio() {
  audioTracks.forEach(t => t.audio.pause());
  stopContinuousClick();
}

function loadAudioTracks() {
  stopAllAudio();
  audioTracks = [];
  if (!song?.audio?.length) return;
  song.audio.forEach(track => {
    const audio = new Audio('songs/' + track.file);
    audio.loop = true;
    audio.volume = 1;
    audioTracks.push({ name: track.name, audio });
  });
}

/* ── Transport ── */
function startSong() {
  initAudio();
  playing = true;
  document.getElementById('playBtn').innerHTML = '⏸️ PAUSE';
  playCountIn(4, () => {
    startBackingTracks();
    startTime = Date.now() - pausedElapsed * 1000; /* FIX: resume from pausedElapsed */
    startContinuousClick();
  });
}

function pauseSong() {
  playing = false;
  /* FIX: capture elapsed before pausing so resume is seamless */
  pausedElapsed = startTime ? (Date.now() - startTime) / 1000 : pausedElapsed;
  pauseAllAudio();
  document.getElementById('playBtn').innerHTML = '▶️ PLAY';
}

function stopSong() {
  playing = false;
  pausedElapsed = 0;
  startTime = null;
  document.getElementById('playBtn').innerHTML = '▶️ PLAY';
  document.getElementById('bigChord').textContent = '';
  document.getElementById('nextChord').textContent = '—';
  document.getElementById('lyricsInner').style.transform = 'translateY(0)';
  stopAllAudio();
  renderLyrics();
}

function togglePlayPause() {
  if (playing) pauseSong(); else startSong();
}

function previousSong() { stopSong(); currentSongIndex = (currentSongIndex - 1 + setlist.length) % setlist.length; loadSong(); }
function nextSong()     { stopSong(); currentSongIndex = (currentSongIndex + 1) % setlist.length; loadSong(); }

/* ── Setlist / Song Loading ── */
async function loadSetlist() {
  try {
    const res = await fetch('setlist.json');
    if (res.ok) setlist = await res.json();
  } catch(e) { console.warn('setlist.json not found'); }
  renderSetlist();
  if (setlist.length) loadSong();
}

async function loadSong() {
  if (!setlist.length) return;
  const entry = setlist[currentSongIndex];
  const file = entry.file || entry;
  const nextEntry = setlist[(currentSongIndex + 1) % setlist.length];
  document.getElementById('nextSong').textContent = nextEntry ? (nextEntry.title || nextEntry) : '—';
  try {
    const res = await fetch('songs/' + file);
    song = await res.json();
    currentBPM = song.bpm || 120;
    document.getElementById('currentSong').textContent = [entry.artist, entry.title || file.replace('.json','')].filter(Boolean).join(' – ');
    renderLyrics();
    loadAudioTracks();
    recalcScrollMultiplier();
  } catch(e) {
    song = { title: 'Missing Chart', lines: [] };
    currentBPM = 120;
    document.getElementById('currentSong').textContent = (entry.title || file) + ' (chart missing)';
    renderLyrics();
  }
  renderSetlist();
}

function recalcScrollMultiplier() {
  const inner = document.getElementById('lyricsInner');
  if (!song?.lines?.length) return;
  const totalTime = (song.lines[song.lines.length-1].time || 0) + 15;
  scrollMultiplier = Math.max(9, inner.scrollHeight / totalTime * 1.15);
}

/* ── Rendering ── */
function renderLyrics() {
  const inner = document.getElementById('lyricsInner');
  inner.innerHTML = '';
  if (!song?.lines?.length) {
    inner.innerHTML = '<div style="opacity:.4;font-style:italic;">(no chart loaded – import one above)</div>';
    return;
  }
  song.lines.forEach((line, i) => {
    const div = document.createElement('div');
    div.className = line.isSection ? 'line section' : 'line';
    if (line.isSection) {
      div.innerHTML = `<span class="chord" data-i="${i}">${line.lyric}</span>`;
    } else {
      div.innerHTML = `<span class="chord" data-i="${i}">${line.chord || ''}</span> ${line.lyric || ''}`;
    }
    inner.appendChild(div);
  });
}

function renderSetlist() {
  const container = document.getElementById('setlistItems');
  container.innerHTML = '';
  setlist.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = 'setlist-item' + (i === currentSongIndex ? ' current' : '');
    div.innerHTML = `<strong>${i+1}.</strong> ${entry.artist || ''} – ${entry.title || entry.file}
      <span class="dropdown-arrow" onclick="event.stopImmediatePropagation();toggleDropdown(${i})">${i === expandedSongIndex ? '▲' : '▼'}</span>`;
    div.onclick = e => {
      if (e.target.classList.contains('dropdown-arrow')) return;
      stopSong(); currentSongIndex = i; loadSong();
    };
    container.appendChild(div);

    if (i === expandedSongIndex) {
      const sub = document.createElement('div');
      sub.className = 'track-subpanel';

      /* Audio track rows */
      if (song?.audio?.length) {
        song.audio.forEach((track, ti) => {
          const row = document.createElement('div');
          row.className = 'track-row';
          row.innerHTML = `<label>${track.name}</label>
            <input type="range" min="0" max="1" step="0.01" value="1" style="width:100px;">
            <button onclick="soloTrack(${ti})" class="btn" style="padding:4px 10px;font-size:13px;">Solo</button>`;
          row.querySelector('input').oninput = e => {
            const t = audioTracks.find(a => a.name === track.name);
            if (t) t.audio.volume = +e.target.value;
          };
          sub.appendChild(row);
        });
      }

      /* Vocal offset */
      const offRow = document.createElement('div');
      offRow.className = 'track-row';
      offRow.style.cssText = 'border-top:1px solid #444;margin-top:8px;padding-top:8px;';
      offRow.innerHTML = `<label>Lyric offset (sec)</label>
        <input type="number" id="vocalOffsetInput" value="${song?.lyricOffset ?? 0}" step="0.1" style="width:80px;">
        <button onclick="saveVocalOffset()" class="btn" style="padding:4px 10px;font-size:13px;">Save</button>`;
      sub.appendChild(offRow);

      /* Click track */
      const clkRow = document.createElement('div');
      clkRow.className = 'track-row';
      clkRow.style.cssText = 'border-top:1px solid #444;margin-top:8px;padding-top:8px;';
      clkRow.innerHTML = `<label>Click Track</label>
        <button onclick="clickOn=!clickOn;renderSetlist()" class="btn" style="padding:4px 10px;font-size:13px;">${clickOn ? 'ON' : 'OFF'}</button>
        <input type="range" min="0" max="1" step="0.01" value="${clickVolume}" style="width:100px;">`;
      clkRow.querySelector('input').oninput = e => { clickVolume = +e.target.value; };
      sub.appendChild(clkRow);

      container.appendChild(sub);
    }
  });
}

function soloTrack(index) {
  audioTracks.forEach((t, i) => t.audio.volume = i === index ? 1 : 0);
}

function saveVocalOffset() {
  if (!song) return;
  song.lyricOffset = parseFloat(document.getElementById('vocalOffsetInput').value) || 0;
}

function toggleDropdown(index) {
  expandedSongIndex = expandedSongIndex === index ? -1 : index;
  if (expandedSongIndex === index && currentSongIndex !== index) { currentSongIndex = index; loadSong(); return; }
  renderSetlist();
}

/* ── Main Loop ── */
setInterval(() => {
  if (!song?.lines) return;
  let elapsed;
  if (playing) {
    elapsed = audioTracks.length ? audioTracks[0].audio.currentTime : (Date.now() - startTime) / 1000;
  } else {
    elapsed = pausedElapsed;
  }
  const offset = song.lyricOffset ?? 0;
  const adj = Math.max(0, elapsed - offset);
  updateHighlight(adj);
  scrollLyrics(adj);
  updateTimeDisplay(elapsed);
}, 40);

function updateHighlight(adj) {
  if (!song?.lines) return;
  let ai = -1;
  for (let i = 0; i < song.lines.length; i++) {
    if (adj >= song.lines[i].time) ai = i; else break;
  }
  document.getElementById('bigChord').textContent = ai >= 0 ? (song.lines[ai].chord || '') : '';
  const ni = ai + 1;
  const nc = document.getElementById('nextChord');
  nc.textContent = ni < song.lines.length ? (song.lines[ni].chord || '') : '—';
  document.querySelectorAll('.chord').forEach(el => el.classList.toggle('active', +el.dataset.i === ai));
}

function scrollLyrics(adj) {
  document.getElementById('lyricsInner').style.transform = `translateY(-${adj * scrollMultiplier}px)`;
}

function updateTimeDisplay(elapsed) {
  const total = song?.lines?.length ? (song.lines[song.lines.length-1].time + 20) : 0;
  const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s)%60).padStart(2,'0')}`;
  document.getElementById('songTime').textContent = `${fmt(elapsed)} / ${fmt(total)}`;
}

/* ── Import / Parse ── FIX: was not implemented */
function openModal(id)  { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => document.getElementById('chartPaste').value = ev.target.result;
  reader.readAsText(file);
}

function parseAndImport() {
  const raw = document.getElementById('chartPaste').value.trim();
  if (!raw) { alert('Please paste a chord chart first.'); return; }

  const title  = document.getElementById('importTitle').value || 'New Song';
  const artist = document.getElementById('importArtist').value || 'Unknown Artist';
  const bpm    = parseInt(document.getElementById('importBpm').value) || 120;

  const lines = [];
  let time = 0;
  const timeRx = /^(\d{1,2}):(\d{2})\s+/;
  const sectionRx = /^\[(.*?)\]$/;
  const chordRx = /^([A-G][#b]?(?:m|maj|min|dim|aug|sus|add|M)?(?:\d+)?(?:\/[A-G][#b]?)?)\s*(.*)/;

  raw.split('\n').forEach(rawLine => {
    const line = rawLine.trim();
    if (!line) return;

    let t = time;
    let rest = line;
    const tm = line.match(timeRx);
    if (tm) { t = parseInt(tm[1]) * 60 + parseInt(tm[2]); rest = line.slice(tm[0].length).trim(); time = t; }

    if (sectionRx.test(rest)) {
      lines.push({ time: t, chord: '', lyric: rest, isSection: true });
      return;
    }

    const cm = rest.match(chordRx);
    if (cm) {
      lines.push({ time: t, chord: cm[1], lyric: cm[2].trim(), isSection: false });
      if (!tm) time += 60000 / bpm / 1000 * 4;
    } else {
      lines.push({ time: t, chord: '', lyric: rest, isSection: false });
      if (!tm) time += 4;
    }
  });

  parsedSongTemp = { title, artist, bpm, lyricOffset: 0, audio: [], lines };

  const preview = document.getElementById('importPreview');
  preview.style.display = 'block';
  preview.textContent = JSON.stringify(parsedSongTemp, null, 2);
  document.getElementById('downloadBtn').style.display = 'inline-block';
  document.getElementById('loadNowBtn').style.display = 'inline-block';
}

function downloadSongJSON() {
  if (!parsedSongTemp) return;
  const blob = new Blob([JSON.stringify(parsedSongTemp, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (parsedSongTemp.title || 'song').replace(/\s+/g, '_') + '.json';
  a.click();
}

function loadParsedSong() {
  if (!parsedSongTemp) return;
  song = parsedSongTemp;
  currentBPM = song.bpm;
  document.getElementById('currentSong').textContent = [song.artist, song.title].filter(Boolean).join(' – ');
  renderLyrics();
  loadAudioTracks();
  recalcScrollMultiplier();
  closeModal('importModal');
}

/* ── MIDI ── */
function saveMidiMap() {
  CC.prev  = +document.getElementById('ccPrev').value;
  CC.stop  = +document.getElementById('ccStop').value;
  CC.play  = +document.getElementById('ccPlay').value;
  CC.next  = +document.getElementById('ccNext').value;
  CC.click = +document.getElementById('ccClick').value;
  Object.entries(CC).forEach(([k,v]) => localStorage.setItem('midiCC'+k.charAt(0).toUpperCase()+k.slice(1), v));
  closeModal('midiModal');
}

function initMIDI() {
  if (!navigator.requestMIDIAccess) return;
  navigator.requestMIDIAccess().then(access => {
    const handle = input => { input.onmidimessage = e => {
      if (e.data[0] !== 0xB0) return;
      const cc = e.data[1];
      if (cc === CC.prev)  previousSong();
      else if (cc === CC.stop)  stopSong();
      else if (cc === CC.play)  togglePlayPause();
      else if (cc === CC.next)  nextSong();
      else if (cc === CC.click) { clickOn = !clickOn; renderSetlist(); }
    }; };
    access.inputs.forEach(handle);
    access.onstatechange = e => { if (e.port.type === 'input' && e.port.state === 'connected') handle(e.port); };
  }).catch(()=>{});
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

/* ── Init ── */
window.onload = () => {
  initMIDI();
  loadSetlist();
};
</script>
