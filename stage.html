<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Stage Teleprompter</title>
    <link rel="stylesheet" href="css/stage.css">
    <style>
        body{
            background:black;
            color:white;
            font-family:Arial;
            overflow:hidden;
            margin:0;
            padding:0;
        }

        #topBar{
            position:fixed;
            top:0;
            width:100%;
            display:flex;
            align-items:center;
            gap:20px;
            padding:12px 30px;
            font-size:28px;
            background:rgba(0,0,0,0.85);
            z-index:50;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        #currentSongContainer {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
        }
        #currentSong {
            font-size: 26px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            line-height: 1.2;
        }

        #nextSongContainer {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            opacity: 0.85;
            white-space: nowrap;
        }

        .top-controls {
            flex: 0 0 auto;
            display: flex;
            gap: 10px;
        }

        /* SLEEK BUTTONS (unchanged – dark & modern) */
        .sleek-btn {
            background: #1f1f1f;
            color: #e5e5e5;
            border: 1px solid #444;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sleek-btn:hover {
            background: #2a2a2a;
            border-color: #00cc77;
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 204, 119, 0.25);
        }
        .sleek-btn.primary {
            background: #00aa66;
            color: #111;
            border: none;
            font-weight: 700;
        }
        .sleek-btn.primary:hover {
            background: #00cc77;
            transform: translateY(-1px);
        }

        /* CORE STAGE ELEMENTS – responsive base */
        #bigChord{
            position:fixed;
            top:110px;
            width:100%;
            font-size: clamp(180px, 22vw, 340px);
            font-weight:bold;
            color:#00cc77;
            text-align:center;
            z-index:10;
            text-shadow: 0 0 30px #00cc77;
            pointer-events:none;
            line-height:1;
        }

        #lyricsContainer{
            position:absolute;
            bottom:-100vh;
            width:100%;
            text-align:center;
            font-size: clamp(26px, 3.2vw, 36px);
            line-height:1.45;
            z-index:5;
            padding:0 20px;
        }

        .line{
            margin:28px 0;
            padding:0 20px;
        }

        .chord{
            font-weight:bold;
            color:white;
            display:inline-block;
            min-width:90px;
        }

        .chord.active{
            color:#00cc77;
            text-shadow: 0 0 20px #00cc77;
        }

        /* PORTRAIT OPTIMIZATIONS – automatic when monitor is rotated */
        @media (orientation: portrait), (max-width: 1100px) {
            #topBar {
                padding: 10px 15px;
                gap: 12px;
                flex-wrap: wrap;
                font-size: 24px;
            }
            #currentSong { font-size: 23px; }
            #nextSongContainer { font-size: 19px; }

            .top-controls button { padding: 8px 14px; font-size: 15px; }

            #bigChord {
                top: 80px;
                font-size: clamp(140px, 26vw, 260px);
            }

            #lyricsContainer {
                font-size: clamp(22px, 3.8vw, 32px);
                line-height: 1.5;
            }
            .line { margin: 22px 0; }

            /* Setlist becomes a clean top overlay in portrait (no side panel eating width) */
            #setlistPanel {
                left: 15px;
                right: 15px;
                top: 68px;
                width: auto;
                max-height: 55vh;
                border-radius: 12px;
                padding: 15px;
            }
            .setlist-item {
                font-size: 17px;
                padding: 9px 12px;
            }

            /* MIDI panel centered at bottom for easy thumb/finger access */
            #midiPanel {
                left: 50%;
                bottom: 20px;
                transform: translateX(-50%);
                width: 92%;
                max-width: 420px;
                border-radius: 20px;
            }

            /* Extra breathing room for lyrics scrolling */
            #lyricsContainer { padding-bottom: 80px; }
        }

        /* Modal & other panels (portrait-safe) */
        #modal-content {
            background: #111;
            padding: 30px;
            border-radius: 12px;
            width: 92%;
            max-width: 920px;
            max-height: 94vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0,204,119,0.3);
        }
        #modal-content label { display:block; margin:14px 0 6px; font-size:18px; font-weight:bold; }
        #modal-content input, #modal-content textarea {
            width:100%; padding:12px; background:#222; color:#0f0; border:2px solid #333;
            border-radius:6px; font-family:monospace; font-size:16px;
        }
        #modal-content textarea { height:240px; resize:vertical; }
        #modal-content input[type="file"] { padding:10px; background:#1a1a1a; color:#0f0; cursor:pointer; }

        #preview { margin-top:24px; max-height:340px; overflow-y:auto; background:#1a1a1a; padding:18px; border-radius:8px; }
        #preview ul { list-style:none; padding:0; }
        #preview li { padding:10px 14px; background:#222; margin:6px 0; border-radius:6px; display:flex; align-items:center; gap:14px; }
        #jsonPreview {
            background:#111; color:#0f0; padding:18px; font-family:monospace; font-size:14px;
            white-space:pre; overflow:auto; max-height:300px; border-radius:8px; margin-top:20px;
        }

        #midiPanel {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(15,15,15,0.95);
            border: 2px solid #222;
            border-radius: 16px;
            padding: 18px 22px;
            z-index: 999;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            min-width: 340px;
        }
        #midiPanel .header {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            color: #ddd;
        }
        #midiPanel button { flex: 1; margin: 4px; }

        #setlistPanel {
            position: fixed;
            left: 20px;
            top: 100px;
            width: 340px;
            height: calc(100vh - 160px);
            background: rgba(15,15,15,0.95);
            border: 2px solid #222;
            border-radius: 16px;
            padding: 20px;
            overflow-y: auto;
            z-index: 40;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            color: white;
            display: block;
        }
        .setlist-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            color: #ddd;
        }
        .setlist-item {
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 19px;
            line-height: 1.3;
        }
        .setlist-item:hover { background: #222; }
        .setlist-item.current {
            background: #00aa66;
            color: #111;
            font-weight: bold;
            box-shadow: 0 0 12px #00cc77;
        }
    </style>
</head>
<body>
    <div id="topBar">
        <div id="currentSongContainer">
            <span id="currentSong">No song loaded</span>
        </div>

        <div id="nextSongContainer">
            Next: <span id="nextSong">—</span>
        </div>
        
        <div class="top-controls">
            <button onclick="toggleModal()" class="sleek-btn primary">📥 Import</button>
            <button onclick="toggleMidiPanel()" class="sleek-btn">🎹 MIDI</button>
            <button onclick="toggleSetlistPanel()" class="sleek-btn">📜 Setlist</button>
            <button onclick="toggleFullscreen()" class="sleek-btn">⛶ Full</button>
        </div>
    </div>

    <div id="bigChord"></div>
    <div id="lyricsContainer"><div id="lyrics"></div></div>

    <!-- Import Modal -->
    <div id="modal">
        <div id="modal-content">
            <h2 style="margin-top:0; color:#ddd;">🚀 Auto-Import Chord Chart</h2>
            <p style="margin-bottom:22px; opacity:0.8; line-height:1.4;">
                Paste text OR upload a .txt file.<br>
                <strong style="color:#ff0;">Ultimate Guitar tip:</strong> Copy the entire tab and paste here.
            </p>
            
            <label>Song Title</label>
            <input id="importTitle" type="text" value="New Song" placeholder="Song Title">
            
            <label>Artist</label>
            <input id="importArtist" type="text" value="Unknown Artist" placeholder="Artist Name">
            
            <label>BPM</label>
            <input id="importBpm" type="number" value="120" min="40" max="240">
            
            <label>Paste Chord Chart</label>
            <textarea id="chartPaste" placeholder="Paste full tab here..."></textarea>

            <label>Or upload .txt file</label>
            <input type="file" id="chartFile" accept=".txt" onchange="handleFileUpload(event)">
            
            <div style="margin:24px 0; display:flex; gap:12px;">
                <button onclick="parseAndImport()" class="sleek-btn primary">Parse &amp; Preview</button>
                <button onclick="closeModal()" class="sleek-btn">Cancel</button>
            </div>

            <div id="preview"></div>
            <div id="jsonPreview" style="display:none;"></div>
            
            <div style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap;">
                <button id="downloadBtn" onclick="downloadSongJSON()" style="display:none;" class="sleek-btn primary">⬇️ Download song.json</button>
                <button id="tempLoadBtn" onclick="loadTempSongNow()" style="display:none;" class="sleek-btn">▶️ Preview NOW</button>
                <button onclick="closeModal()" class="sleek-btn">Close</button>
            </div>
        </div>
    </div>

    <!-- MIDI Panel -->
    <div id="midiPanel">
        <div class="header">
            <span style="font-size:22px;">🎹 MIDI Controls</span>
            <span id="liveBpm" style="margin-left:auto; font-family:monospace; background:#222; padding:4px 12px; border-radius:9999px; font-size:18px;">BPM: —</span>
        </div>
        <div style="display:flex; gap:8px;">
            <button onclick="previousSong()" class="sleek-btn">⏮ PREV</button>
            <button onclick="togglePlayPause()" class="sleek-btn" id="playPauseBtn" style="flex:1.4;">▶️ PLAY / PAUSE</button>
            <button onclick="nextSong()" class="sleek-btn">⏭ NEXT</button>
        </div>
    </div>

    <!-- Setlist Panel (auto-optimised for portrait) -->
    <div id="setlistPanel">
        <div class="setlist-header">
            <h3 style="margin:0;">📜 SETLIST</h3>
            <button onclick="toggleSetlistPanel()" class="sleek-btn" style="margin-left:auto; background:none; border:none; color:#ddd; font-size:28px; padding:4px 12px; box-shadow:none;">✕</button>
        </div>
        <div id="setlistItems"></div>
    </div>

    <script src="js/midi.js"></script>
    <script src="js/scroll.js"></script>
    <script src="js/stage.js"></script>
    <script>
        // Tiny portrait helper – forces re-layout when you rotate the external monitor
        function handleOrientationChange() {
            // Re-render setlist so it respects the new media query instantly
            if (typeof renderSetlist === 'function') renderSetlist();
            console.log('%c📱 Portrait mode layout refreshed', 'color:#00cc77;font-size:13px');
        }
        window.addEventListener('resize', handleOrientationChange);
        window.addEventListener('orientationchange', handleOrientationChange);
        // Initial check
        setTimeout(handleOrientationChange, 800);
    </script>
</body>
</html>
