<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Guitar Stage Teleprompter</title>
<style>
*{box-sizing:border-box;}
body{background:#000;color:#fff;font-family:Arial,sans-serif;overflow:hidden;margin:0;padding:0;}
#topBar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(0,0,0,.97);z-index:100;height:66px;border-bottom:1px solid #1a1a1a;}
#currentSong{font-size:20px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
#nextSongContainer{font-size:13px;color:#888;white-space:nowrap;flex-shrink:0;}
#songTime{font-family:monospace;font-size:15px;color:#0f0;white-space:nowrap;flex-shrink:0;min-width:90px;text-align:right;}
.top-controls{display:flex;gap:6px;flex-shrink:0;}

/* TAB STRIP */
#tabStrip{position:fixed;bottom:66px;left:368px;right:12px;height:172px;background:#060606;border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;overflow:hidden;z-index:108;display:none;}
#tabStripLabel{position:absolute;left:0;top:0;bottom:0;width:54px;display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:1px;color:#3a3a3a;background:#060606;border-right:1px solid #1a1a1a;z-index:2;}
#tabStripInner{position:absolute;left:54px;top:0;width:calc(100% - 54px);height:100%;overflow-y:auto;white-space:pre;font-family:'Courier New',monospace;font-size:14px;color:#00cc77;padding:14px 28px 14px 18px;line-height:1.32;letter-spacing:0.5px;background:#0a120a;scrollbar-width:thin;scrollbar-color:#00cc77 #1a1a1a;}
#tabStripInner::-webkit-scrollbar{width:12px;}
#tabStripInner::-webkit-scrollbar-thumb{background:#00cc77;border-radius:6px;}

/* Tempo light */
#tempoContainer{display:flex;align-items:center;gap:8px;margin-left:12px;}
#tempoLight{width:20px;height:20px;border-radius:50%;background:#00cc77;box-shadow:0 0 0 3px rgba(0,204,119,.3);transition:all .08s ease;opacity:.4;}
#tempoLight.active{opacity:1;box-shadow:0 0 22px 10px #00ff99;transform:scale(1.35);}

/* Lyrics */
#lyricsContainer{position:fixed;top:488px;bottom:78px;left:368px;right:12px;overflow:hidden;text-align:center;font-size:clamp(19px,2.3vw,32px);line-height:1.6;padding:18px 40px;z-index:10;color:#d4d4d4;}
#lyricsInner{position:relative;transition:transform .05s linear;}
.line{margin:18px 0;padding:4px 12px;border-radius:5px;}
.chord{font-weight:bold;color:#666;display:inline-block;min-width:96px;margin-right:10px;transition:color .18s;}
.chord.active{color:#00cc77;text-shadow:0 0 12px #00cc77;}
.section{color:#00cc77!important;font-weight:bold;font-size:1.28em;margin:26px 0 10px;text-shadow:0 0 10px #00cc77;}

/* Chord display */
#bigChord{font-size:clamp(100px,15vw,250px);font-weight:bold;color:#00cc77;text-shadow:0 0 24px #00cc77;line-height:1;transition:transform .25s cubic-bezier(0.4,0,0.2,1), opacity .3s ease;}
#bigChord.pulse{transform:scale(1.12);}
#chordDiagramsRow{display:flex;gap:10px;align-items:flex-start;overflow-x:auto;padding-bottom:2px;min-height:105px;transition:opacity .3s ease;}
.chord-card{transition:transform .3s cubic-bezier(0.4,0,0.2,1), opacity .3s ease;opacity:1;}
.chord-card.fade{opacity:0;transform:scale(0.92);}

/* Big chord container - CENTERED */
#bigChordContainer{position:fixed;top:92px;left:368px;right:12px;display:flex;align-items:center;justify-content:center;gap:40px;z-index:95;pointer-events:none;}
#arrowBetween{font-size:clamp(40px,5vw,80px);color:#00cc77;opacity:.6;}
#nextChord{font-size:clamp(38px,5.5vw,88px);font-weight:bold;color:#00cc77;opacity:.38;transition:opacity .3s;}
#nextChord.active{opacity:1;}

/* Rest of layout */
#chordMask{position:fixed;top:66px;left:0;right:0;height:490px;background:linear-gradient(to bottom,#000 74%,transparent 93%);z-index:90;pointer-events:none;}
#transportBar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(10,10,10,.97);border:1px solid #1e1e1e;border-radius:9999px;padding:6px 14px;display:flex;gap:8px;align-items:center;z-index:110;box-shadow:0 6px 22px rgba(0,0,0,.7);}
.btn{background:#181818;color:#ddd;border:1px solid #333;padding:6px 13px;font-size:13px;font-weight:500;border-radius:9999px;cursor:pointer;transition:background .16s,border-color .16s,transform .1s;}
.btn:hover{background:#242424;border-color:#00cc77;color:#fff;transform:translateY(-1px);}
.btn.primary{background:#00aa66;color:#080808;border:none;font-weight:700;}
.btn.lit{background:#003d25;border-color:#00cc77;color:#00ff99;}
#leftPanel{position:fixed;left:8px;top:72px;width:352px;bottom:8px;display:flex;flex-direction:column;gap:7px;z-index:500;}
#setlistPanel{background:#101010;border:1px solid #242424;border-radius:11px;padding:12px;overflow-y:auto;flex:1;min-height:0;position:relative;}
.setlist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.setlist-item{padding:9px 12px;margin:3px 0;border-radius:6px;cursor:pointer;transition:background .16s;position:relative;color:#e8e8e8;font-size:13px;line-height:1.3;}
.setlist-item:hover{background:#282828;}
.setlist-item.current{background:#00aa66;color:#060606;font-weight:bold;box-shadow:0 0 9px #00cc77;}
.setlist-item.dragging{opacity:0.4;}
.dropdown-arrow{position:absolute;right:10px;top:9px;cursor:pointer;font-size:17px;color:#0f0;z-index:10;}
.track-subpanel{margin:4px 0 4px 10px;background:rgba(0,0,0,.4);padding:10px;border-radius:6px;}
.track-row{display:flex;align-items:center;gap:6px;margin:6px 0;font-size:12px;}
.track-row label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#chordPanel{background:#101010;border:1px solid #242424;border-radius:11px;padding:11px;flex-shrink:0;}
#chordPanelHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
#chordPanelTitle{font-size:11px;color:#444;letter-spacing:1px;}
#chordPanelName{font-size:15px;font-weight:bold;color:#00cc77;}
#chordDiagramsRow::-webkit-scrollbar{height:3px;}
#chordDiagramsRow::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px;}
.chord-card-name{font-size:12px;font-weight:bold;color:#00cc77;}
.chord-card-label{font-size:10px;color:#444;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:1000;align-items:center;justify-content:center;}
.modal-box{background:#0d0d0d;padding:24px;border-radius:11px;width:92%;max-width:800px;max-height:92vh;overflow-y:auto;box-shadow:0 0 36px rgba(0,204,119,.15);border:1px solid #1c1c1c;}
.modal-box label{display:block;margin:10px 0 3px;font-size:14px;font-weight:bold;color:#bbb;}
.modal-box input,.modal-box textarea,.modal-box select{width:100%;padding:8px;background:#161616;color:#0f0;border:1px solid #2a2a2a;border-radius:5px;font-family:monospace;font-size:13px;}
.modal-box textarea{height:180px;resize:vertical;}
.songsterr-box{background:#081308;border:1px solid #0d3020;border-radius:7px;padding:12px;margin-bottom:14px;}

/* MIDI Activity Light */
#miiActivityLight{width:18px;height:18px;border-radius:50%;background:#222;box-shadow:0 0 0 3px rgba(0,204,119,.3);transition:all .12s ease;opacity:0.3;}
#miiActivityLight.active{opacity:1;background:#00ff88;box-shadow:0 0 18px 12px #00ff99;transform:scale(1.3);}

/* Status messages */
.status{text-align:center;color:#0f0;font-size:13px;padding:8px;margin:4px 0;background:#111;border-radius:6px;}
</style>
</head>
<body>
<div id="topBar">
  <span id="currentSong">No song loaded</span>
  <span id="nextSongContainer">Next: <span id="nextSong">—</span></span>
  <span id="songTime">0:00 / 0:00</span>
  <div class="top-controls">
    <button onclick="openModal('importModal')" class="btn primary">📥 Import</button>
    <button onclick="openModal('tabModal')" class="btn">🎸 Tab</button>
    <button onclick="openModal('midiModal')" class="btn">⚙️ MIDI</button>
    <button onclick="toggleFullscreen()" class="btn">⛶</button>
  </div>
</div>
<div id="chordMask"></div>
<div id="bigChordContainer">
  <div id="bigChord"></div>
  <span id="arrowBetween">→</span>
  <div id="nextChord">—</div>
</div>
<div id="lyricsContainer"><div id="lyricsInner"></div></div>

<div id="tabStrip">
  <div id="tabStripLabel">TAB</div>
  <div id="tabStripInner"></div>
</div>

<div id="transportBar">
  <button onclick="previousSong()" class="btn">⏮ PREV</button>
  <button onclick="stopSong()" class="btn">⏹ STOP</button>
  <button onclick="togglePlayPause()" class="btn primary" id="playBtn">▶️ PLAY</button>
  <button onclick="nextSong()" class="btn">NEXT ⏭</button>
  <div id="tempoContainer">
    <div id="tempoLight"></div>
    <button onclick="toggleTempoLight()" class="btn" id="tempoBtn" style="padding:4px 10px;font-size:12px;">TEMPO</button>
  </div>
  <button onclick="toggleTabStrip()" class="btn" id="tabToggleBtn" style="display:none;">TAB</button>
</div>

<div id="leftPanel">
  <div id="setlistPanel">
    <div class="setlist-header">
      <span style="font-size:11px;color:#444;letter-spacing:1px;">SETLIST</span>
      <button onclick="reloadPlaylist()" class="btn" style="padding:2px 8px;font-size:11px;">Reload</button>
    </div>
    <div id="setlistStatus" class="status" style="display:none;"></div>
    <div id="setlistItems"></div>
  </div>
  <div id="chordPanel">
    <div id="chordPanelHeader">
      <span id="chordPanelTitle">CHORD SHAPES</span>
      <span id="chordPanelName"></span>
    </div>
    <div id="chordDiagramsRow"></div>
  </div>
</div>

<!-- Import Modal -->
<div id="importModal" class="modal-overlay">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2 style="margin:0;color:#ddd;font-size:17px;">📥 Import Chord Chart</h2>
      <button onclick="closeModal('importModal')" style="background:none;border:none;font-size:26px;color:#666;cursor:pointer;">×</button>
    </div>
    <label>Song Title</label><input id="importTitle" type="text" value="New Song">
    <label>Artist</label><input id="importArtist" type="text" value="Unknown Artist">
    <label>BPM</label><input id="importBpm" type="number" value="120" min="40" max="240">
    <label>Paste Chord Chart</label>
    <textarea id="chartPaste" placeholder="Format each line as:&#10; 0:00 Am lyrics here&#10; 0:15 F next line&#10;&#10;Section headers: [Verse], [Chorus]&#10;Lines without timestamps auto-advance 4 seconds."></textarea>
    <label>Or upload .txt file</label>
    <input type="file" id="chartFile" accept=".txt" onchange="handleFileUpload(event)">
    <div style="margin:14px 0;display:flex;gap:7px;flex-wrap:wrap;">
      <button onclick="parseAndImport()" class="btn primary">Parse &amp; Preview</button>
      <button id="downloadBtn" onclick="downloadSongJSON()" style="display:none;" class="btn">⬇️ Download JSON</button>
      <button id="loadNowBtn" onclick="loadParsedSong()" style="display:none;" class="btn primary">▶️ Load Now</button>
      <button onclick="closeModal('importModal')" class="btn">Cancel</button>
    </div>
    <div id="importPreview" style="display:none;color:#0f0;font-family:monospace;font-size:11px;white-space:pre-wrap;max-height:160px;overflow-y:auto;background:#070707;padding:9px;border-radius:5px;border:1px solid #1a1a1a;"></div>
  </div>
</div>

<!-- Tab Modal -->
<div id="tabModal" class="modal-overlay">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2 style="margin:0;color:#ddd;font-size:17px;">🎸 Tab Override</h2>
      <button onclick="closeModal('tabModal')" style="background:none;border:none;font-size:26px;color:#666;cursor:pointer;">×</button>
    </div>
    <p style="font-size:13px;color:#0f0;margin-bottom:12px;">Tabs auto-load from <code>songs/[songname]-tab.txt</code>.<br>Use this only for manual overrides.</p>
    <label>Paste / Edit ASCII Tab (override)</label>
    <textarea id="tabPaste" style="height:170px;color:#00cc77;" placeholder="e|--0--3--5--3--0----|&#10;B|--1--3--5--3--1----|&#10;G|--0--4--5--4--0----|&#10;D|--2--5--7--5--2----|&#10;A|--3--5--7--5--3----|&#10;E|--x--x--x--x--x----|"></textarea>
    <label>Display string (for multi-string tab)</label>
    <select id="tabStringSelect">
      <option value="all">All strings (stacked, full 6-line tab)</option>
      <option value="0">String 1 – high e</option>
      <option value="1">String 2 – B</option>
      <option value="2">String 3 – G</option>
      <option value="3">String 4 – D</option>
      <option value="4">String 5 – A</option>
      <option value="5">String 6 – low E</option>
    </select>
    <div style="margin:18px 0;display:flex;gap:8px;flex-wrap:wrap;">
      <button onclick="applyTab()" class="btn primary">Apply Override</button>
      <button onclick="saveTabToSong()" class="btn" style="background:#006633;color:#fff;">💾 Save Override to Song</button>
      <button onclick="clearTab()" class="btn">Clear Tab</button>
      <button onclick="closeModal('tabModal')" class="btn">Close</button>
    </div>
    <div id="tabPreview" style="display:none;background:#050505;border:1px solid #1a1a1a;border-radius:5px;padding:9px;font-family:monospace;font-size:11px;color:#555;max-height:90px;overflow-y:auto;white-space:pre;"></div>
  </div>
</div>

<!-- MIDI Modal -->
<div id="midiModal" class="modal-overlay">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2 style="margin:0;color:#ddd;font-size:17px;">⚙️ MIDI Routing</h2>
      <button onclick="closeModal('midiModal')" style="background:none;border:none;font-size:26px;color:#666;cursor:pointer;">×</button>
    </div>
    
    <div style="background:#081308;border:1px solid #0d3020;border-radius:7px;padding:12px;margin-bottom:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="font-size:13px;color:#0f0;font-weight:bold;">MIDI STATUS</div>
        <div id="midiActivityLight"></div>
      </div>
      <label>MIDI Input Port</label>
      <select id="midiInputSelect" style="width:100%;margin-bottom:12px;"></select>
      <label style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="midiClockSyncCheck" checked>
        <span>Follow external MIDI Clock (tempo sync)</span>
      </label>
      <div id="midiPortsList" style="font-size:12px;color:#0a0;line-height:1.4;margin-top:10px;"></div>
      <button onclick="refreshMidiPorts()" class="btn" style="margin-top:10px;padding:4px 12px;font-size:12px;">🔄 Refresh Ports</button>
    </div>

    <p style="font-size:12px;color:#555;margin-bottom:14px;">CC defaults: 120=Prev • 121=Stop • 122=Play • 123=Next • 124=Click</p>
    <label>CC PREV</label><input id="ccPrev" type="number" min="0" max="127" value="120">
    <label>CC STOP</label><input id="ccStop" type="number" min="0" max="127" value="121">
    <label>CC PLAY/PAUSE</label><input id="ccPlay" type="number" min="0" max="127" value="122">
    <label>CC NEXT</label><input id="ccNext" type="number" min="0" max="127" value="123">
    <label>CC CLICK</label><input id="ccClick" type="number" min="0" max="127" value="124">
    <div style="margin:14px 0;display:flex;gap:7px;">
      <button onclick="saveMidiMap()" class="btn primary">Save</button>
      <button onclick="closeModal('midiModal')" class="btn">Cancel</button>
    </div>
  </div>
</div>

<script>
/* ====================== CHORD LIBRARY ====================== */
const CHORDS = { /* unchanged */ };
const ENHARMONIC = { /* unchanged */ };
function resolveChord(raw) { /* unchanged */ }
function chordSVG(key, frets, barreFret) { /* unchanged */ }
function showChordDiagrams(rawChord) { /* unchanged */ }

/* ====================== STATE ====================== */
let setlist = [], currentIdx = 0, song = null;
let startTime = null, pausedElapsed = 0, playing = false;
let audioTracks = [], audioCtx = null;
let clickOn = true, clickVol = 0.75, clickIv = null;
let expandedIdx = -1, currentBPM = 120, scrollMul = 11.5;
let parsedTemp = null, lastChord = null;
let lastShownChord = '';
let tabVisible = false;
let tempoLightOn = true;
let lastBeatTime = 0;
let midiInputs = [];
let midiActivityTimeout = null;
let followMidiClock = true;
let selectedMidiInput = null;

const CC = {
  prev: +localStorage.getItem('midiCCPrev')||120,
  stop: +localStorage.getItem('midiCCStop')||121,
  play: +localStorage.getItem('midiCCPlay')||122,
  next: +localStorage.getItem('midiCCNext')||123,
  click: +localStorage.getItem('midiCCClick')||124
};

/* ====================== AUDIO & TRANSPORT ====================== */
function initAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function beep(){ /* unchanged */ }
function startClick(){ /* unchanged */ }
function stopClick(){ /* unchanged */ }
function countIn(beats, cb){ /* unchanged */ }
function startTracks(){ /* unchanged */ }
function stopAllAudio(){ /* unchanged */ }
function pauseAllAudio(){ /* unchanged */ }
function loadTracks(){ /* unchanged */ }
function startSong(){ /* unchanged */ }
function pauseSong(){ /* unchanged */ }
function stopSong(){ /* unchanged */ }
function togglePlayPause(){ if(playing) pauseSong(); else startSong(); }

/* ====================== ROBUST SETLIST LOADING ====================== */
async function loadSetlist(){
  const statusEl = document.getElementById('setlistStatus');
  statusEl.style.display = 'block';
  statusEl.textContent = 'Loading playlist...';
  statusEl.style.color = '#0f0';

  try {
    const r = await fetch('setlist.json', {cache: 'no-store'});
    if (!r.ok) throw new Error('setlist.json not found');
    setlist = await r.json();
    statusEl.style.display = 'none';
  } catch(e) {
    console.error(e);
    statusEl.textContent = '❌ No setlist.json found. Place setlist.json in root folder.';
    statusEl.style.color = '#f66';
    setlist = [];
  }
  renderSetlist();
  if (setlist.length) loadSong();
}

async function reloadPlaylist(){
  await loadSetlist();
}

/* ====================== SONG LOADING ====================== */
async function loadSong(){
  if(!setlist.length) return;
  const e = setlist[currentIdx], f = e.file || e;
  const ne = setlist[(currentIdx + 1) % setlist.length];
  document.getElementById('nextSong').textContent = ne ? (ne.title || ne) : '—';

  try {
    const r = await fetch('songs/' + f, {cache: 'no-store'});
    if (!r.ok) throw new Error('Song file missing');
    song = await r.json();
    currentBPM = song.bpm || 120;
    document.getElementById('currentSong').textContent = [e.artist, e.title || f.replace('.json','')].filter(Boolean).join(' – ');
    renderLyrics(); loadTracks(); recalcScroll();
    if (song.tab) autoLoadTab(song.tab);
  } catch(_) {
    song = {title:'Missing', lines:[]}; currentBPM = 120;
    document.getElementById('currentSong').textContent = (e.title || f) + ' (missing)';
    renderLyrics();
  }
  expandedIdx = currentIdx;
  renderSetlist();
}

function nextSong(){ stopSong(); expandedIdx = -1; currentIdx = (currentIdx + 1) % setlist.length; loadSong(); }
function previousSong(){ stopSong(); expandedIdx = -1; currentIdx = (currentIdx - 1 + setlist.length) % setlist.length; loadSong(); }

function renderSetlist(){
  const c = document.getElementById('setlistItems'); c.innerHTML = '';
  setlist.forEach((e,i) => {
    const d = document.createElement('div');
    d.className = 'setlist-item' + (i===currentIdx ? ' current' : '');
    d.draggable = true;
    d.dataset.index = i;
    d.innerHTML = `<strong>${i+1}.</strong> ${e.artist||''} – ${e.title||e.file}<span class="dropdown-arrow" onclick="event.stopImmediatePropagation();toggleDrop(${i})">${i===expandedIdx?'▲':'▼'}</span>`;
    d.ondragstart = ev => { ev.dataTransfer.setData('text/plain', i); d.classList.add('dragging'); };
    d.ondragend = () => d.classList.remove('dragging');
    d.ondragover = ev => ev.preventDefault();
    d.ondrop = ev => {
      ev.preventDefault();
      const fromIdx = parseInt(ev.dataTransfer.getData('text/plain'));
      if (fromIdx === i) return;
      const moved = setlist.splice(fromIdx, 1)[0];
      setlist.splice(i, 0, moved);
      renderSetlist();
    };
    d.onclick = ev => { if(ev.target.classList.contains('dropdown-arrow')) return; stopSong(); currentIdx = i; loadSong(); };
    c.appendChild(d);

    if(i===expandedIdx){
      const sub = document.createElement('div'); sub.className = 'track-subpanel';
      if(song?.audio?.length) song.audio.forEach((t,ti) => {
        const row = document.createElement('div'); row.className = 'track-row';
        row.innerHTML = `<label>${t.name}</label><input type="range" min="0" max="1" step=".01" value="1" style="width:80px;"><button onclick="soloTrack(${ti});event.stopImmediatePropagation()" class="btn" style="padding:2px 7px;font-size:11px;">Solo</button>`;
        row.querySelector('input').oninput = ev => { const tr = audioTracks.find(a=>a.name===t.name); if(tr) tr.audio.volume = +ev.target.value; };
        sub.appendChild(row);
      });
      const or = document.createElement('div'); or.className = 'track-row'; or.style.cssText = 'border-top:1px solid #1e1e1e;margin-top:5px;padding-top:5px;';
      or.innerHTML = `<label>Lyric offset (s)</label><input type="number" id="voi" value="${song?.lyricOffset??0}" step=".1" style="width:64px;"><button onclick="saveOffset();event.stopImmediatePropagation()" class="btn" style="padding:2px 7px;font-size:11px;">Save</button>`;
      sub.appendChild(or);
      const cr = document.createElement('div'); cr.className = 'track-row'; cr.style.cssText = 'border-top:1px solid #1e1e1e;margin-top:5px;padding-top:5px;';
      cr.innerHTML = `<label>Click</label><button onclick="clickOn=!clickOn;renderSetlist();event.stopImmediatePropagation()" class="btn" style="padding:2px 7px;font-size:11px;">${clickOn?'ON':'OFF'}</button><input type="range" min="0" max="1" step=".01" value="${clickVol}" style="width:80px;">`;
      cr.querySelector('input').oninput = ev => { clickVol = +ev.target.value; };
      sub.appendChild(cr);
      c.appendChild(sub);
    }
  });
}
function soloTrack(i){ audioTracks.forEach((t,j) => t.audio.volume = j===i ? 1 : 0); }
function saveOffset(){ if(song) song.lyricOffset = parseFloat(document.getElementById('voi').value)||0; }
function toggleDrop(i){
  expandedIdx = expandedIdx===i ? -1 : i;
  if(expandedIdx===i && currentIdx!==i){ currentIdx=i; loadSong(); return; }
  renderSetlist();
}

setInterval(() => {
  if(!song?.lines) return;
  let el = playing ? (audioTracks.length ? audioTracks[0].audio.currentTime : (Date.now()-startTime)/1000) : pausedElapsed;
  const adj = Math.max(0, el - (song.lyricOffset??0));
  updateHL(adj);
  scrollLyrics(adj);
  updateTime(el);
  updateTempoLight();
}, 30);
