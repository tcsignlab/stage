<script>
let audio = new Audio();
let events = [];

document.getElementById("audioFile")?.addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) audio.src = URL.createObjectURL(file);
});

function parseUG() {
  const bpm = parseFloat(document.getElementById("bpm").value);
  if (!bpm || bpm <= 0) {
    alert("Enter BPM");
    return;
  }

  const beat = 60 / bpm;
  const raw = document.getElementById("input").value.split("\n");

  let time = 0;
  events = [];

  for (let i = 0; i < raw.length; i++) {
    let chordLine = raw[i];
    if (!chordLine.trim()) continue;

    // detect chord line (must contain multiple chords)
    const chordRegex = /[A-G][#b]?m?(maj7|maj|min|sus|dim|aug|add)?\d*(\/[A-G][#b]?)?/g;
    const matches = [...chordLine.matchAll(chordRegex)];

    if (matches.length >= 1) {
      let lyricLine = raw[i + 1] || "";

      let chords = matches.map(m => ({
        chord: m[0],
        pos: m.index
      }));

      chords.forEach((c, idx) => {
        let nextPos = chords[idx + 1]?.pos || lyricLine.length;

        let lyric = lyricLine.substring(c.pos, nextPos).trim();

        events.push({
          time: Number(time.toFixed(2)),
          chord: c.chord,
          lyric: lyric,
          isSection: lyric.startsWith("[")
        });

        // 🔥 THIS IS THE MAGIC
        let spacing = Math.max(nextPos - c.pos, 4);
        let beats = spacing / 5.5; // tuned constant
        time += beats * beat;
      });

      i++; // skip lyric line
    }
  }

  renderEvents();
}

function renderEvents() {
  const container = document.getElementById("lines");
  container.innerHTML = "";

  events.forEach(e => {
    const div = document.createElement("div");
    div.className = "line";

    div.innerHTML = `
      <input class="time" value="${e.time}">
      <input class="chord" value="${e.chord}">
      <input class="lyric" value="${e.lyric}">
      <button onclick="syncTime(this)">🎧 Sync</button>
    `;

    container.appendChild(div);
  });
}

function syncTime(btn) {
  const row = btn.parentElement;
  row.querySelector(".time").value = audio.currentTime.toFixed(2);
}

function exportJSON() {
  const lines = document.querySelectorAll(".line");

  const data = [];

  lines.forEach(line => {
    data.push({
      time: parseFloat(line.querySelector(".time").value || 0),
      chord: line.querySelector(".chord").value,
      lyric: line.querySelector(".lyric").value,
      isSection: line.querySelector(".lyric").value.startsWith("[")
    });
  });

  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "song.json";
  a.click();
}
</script>
