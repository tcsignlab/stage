<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UG Studio Parser</title>

<style>
body { font-family: Arial; background:#111; color:#eee; padding:20px; }
textarea { width:100%; height:200px; }
input, button { margin:5px; padding:8px; }
.line { display:flex; gap:10px; margin:5px 0; }
.time { width:80px; }
.chord { width:80px; }
.lyric { flex:1; }
</style>

</head>

<body>

<h2>🎸 UG Tab → JSON Studio Tool</h2>

<label>BPM:</label>
<input id="bpm" type="number" value="100">

<br>

<input type="file" id="audioFile" accept="audio/*">

<br>

<textarea id="input" placeholder="Paste Ultimate Guitar tab here..."></textarea>

<br>

<button onclick="parseUG()">Parse UG</button>
<button onclick="exportJSON()">Export JSON</button>

<hr>

<div id="lines"></div>

<script>
let audio = new Audio();
let events = [];

// SAFE listener
const audioInput = document.getElementById("audioFile");
if (audioInput) {
  audioInput.addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (file) audio.src = URL.createObjectURL(file);
  });
}

function parseUG() {
  const bpmInput = document.getElementById("bpm");
  const inputBox = document.getElementById("input");

  if (!bpmInput || !inputBox) {
    alert("Missing UI elements");
    return;
  }

  const bpm = parseFloat(bpmInput.value);
  if (!bpm || bpm <= 0) {
    alert("Enter valid BPM");
    return;
  }

  const beat = 60 / bpm;
  const raw = inputBox.value.split("\n");

  let time = 0;
  events = [];

  for (let i = 0; i < raw.length; i++) {
    let chordLine = raw[i];
    if (!chordLine.trim()) continue;

    const chordRegex = /[A-G][#b]?m?(maj7|maj|min|sus|dim|aug|add)?\d*(\/[A-G][#b]?)?/g;
    const matches = [...chordLine.matchAll(chordRegex)];

    if (matches.length > 0) {
      let lyricLine = raw[i + 1] || "";

      let chords = matches.map(m => ({
        chord: m[0],
        pos: m.index
      }));

      chords.forEach((c, idx) => {
        let nextPos = chords[idx + 1]?.pos || lyricLine.length;

        let lyric = lyricLine.substring(c.pos, nextPos).trim();

        events.push({
          time: Number(time.toFixed(2)),
          chord: c.chord,
          lyric: lyric,
          isSection: lyric.startsWith("[")
        });

        let spacing = Math.max(nextPos - c.pos, 4);
        let beats = spacing / 5.5;
        time += beats * beat;
      });

      i++;
    }
  }

  renderEvents();
}

function renderEvents() {
  const container = document.getElementById("lines");
  container.innerHTML = "";

  events.forEach(e => {
    const div = document.createElement("div");
    div.className = "line";

    div.innerHTML = `
      <input class="time" value="${e.time}">
      <input class="chord" value="${e.chord}">
      <input class="lyric" value="${e.lyric}">
      <button onclick="syncTime(this)">🎧</button>
    `;

    container.appendChild(div);
  });
}

function syncTime(btn) {
  const row = btn.parentElement;
  row.querySelector(".time").value = audio.currentTime.toFixed(2);
}

function exportJSON() {
  const lines = document.querySelectorAll(".line");

  const data = [];

  lines.forEach(line => {
    data.push({
      time: parseFloat(line.querySelector(".time").value || 0),
      chord: line.querySelector(".chord").value,
      lyric: line.querySelector(".lyric").value,
      isSection: line.querySelector(".lyric").value.startsWith("[")
    });
  });

  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "song.json";
  a.click();
}
</script>

</body>
</html>
